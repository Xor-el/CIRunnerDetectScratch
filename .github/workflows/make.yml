name: Make

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      # ─── Linux (unified for x86_64 and AArch64) ────────────────────────
      - name: Build on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -xeuo pipefail
          sudo bash -c 'apt-get update; apt-get install -y lazarus' >/dev/null
          openssl version
          fpc -iV
          instantfpc .github/workflows/make.pas

      # ─── macOS (unified for x86_64 and AArch64) ───────────────────────
      - name: Build on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -xeuo pipefail

          LAZARUS_DIR="/tmp/lazarus-src"

          brew install fpc

          # macOS runners ship LibreSSL which is incompatible with FPC's
          # openssl unit. The runners do have OpenSSL 3 preinstalled via
          # Homebrew (as a keg-only dependency) but FPC 3.2.2 on Darwin
          # only tries libssl.1.1.dylib (hardcoded in openssl.pas
          # DLLVersions, with the unversioned name disabled on Darwin).
          # Symlink that name to Homebrew's OpenSSL 3 in /usr/local/lib
          # which is on dyld's default fallback search path.
          # This hack can be removed once we move to FPC 3.2.4+ which
          # natively includes '.3' in DLLVersions.
          OSSL_LIB="$(brew --prefix openssl@3)/lib"
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$OSSL_LIB/libssl.3.dylib"    /usr/local/lib/libssl.1.1.dylib
          sudo ln -sf "$OSSL_LIB/libcrypto.3.dylib"  /usr/local/lib/libcrypto.1.1.dylib

          git clone --depth 1 --branch lazarus_4_4 \
            https://github.com/fpc/Lazarus.git "$LAZARUS_DIR"
          make -C "$LAZARUS_DIR" lazbuild

          # Seed lazbuild config so it can find the Lazarus source tree
          mkdir -p "$HOME/.lazarus"
          cat > "$HOME/.lazarus/environmentoptions.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <CONFIG>
            <EnvironmentOptions>
              <LazarusDirectory Value="$LAZARUS_DIR"/>
              <CompilerFilename Value="$(which fpc)"/>
            </EnvironmentOptions>
          </CONFIG>
          EOF

          export PATH="$LAZARUS_DIR:$PATH"
          "$(brew --prefix openssl@3)/bin/openssl" version
          fpc -iV
          lazbuild --version
          instantfpc .github/workflows/make.pas

      # ─── Windows ────────────────────────────────────────────────────────
      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSDebug -Strict

          Write-Host "Installing Lazarus via Chocolatey..."
          choco install lazarus -y --no-progress

          # Discover FPC bin path dynamically
          $fpcDir = Get-ChildItem 'C:\Lazarus\fpc' -Directory | Select-Object -First 1
          $env:Path += ";C:\Lazarus;$($fpcDir.FullName)\bin\x86_64-win64"

          Write-Host "OpenSSL version:"
          openssl version

          Write-Host "FPC version:"
          fpc -iV

          Write-Host "Building make.pas..."
          instantfpc .github/workflows/make.pas

  # ─── FreeBSD (via QEMU VM on ubuntu-latest) ───────────────────────────
  # Install FPC via pkg, build lazbuild from source (same as macOS).
  # x86_64: stable fpc, .NET 10 from community builds.
  # aarch64: fpc-devel (stable fpc not packaged for arm64), no .NET.
  build-freebsd:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            fpc_pkg: fpc
            dotnet_sdk_url: https://github.com/sec/dotnet-core-freebsd-source-build/releases/download/10.0.102-vmr/dotnet-sdk-10.0.102-freebsd-x64.tar.gz
          - arch: aarch64
            fpc_pkg: fpc-devel
            dotnet_sdk_url: ""
    name: FreeBSD 15.0 (${{ matrix.arch }})
    env:
      DOTNET_SDK_URL: ${{ matrix.dotnet_sdk_url }}
      FPC_PKG: ${{ matrix.fpc_pkg }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          arch: ${{ matrix.arch }}
          usesh: true
          envs: 'DOTNET_SDK_URL FPC_PKG'
          prepare: |
            # Install FPC (package name differs per arch) and build deps
            pkg install -y $FPC_PKG git wget gmake \
              libunwind icu libinotify

            # Build lazbuild from source (same approach as macOS)
            LAZARUS_DIR="/tmp/lazarus-src"
            git clone --depth 1 --branch lazarus_4_4 \
              https://github.com/fpc/Lazarus.git "$LAZARUS_DIR"
            gmake -C "$LAZARUS_DIR" lazbuild

            # Seed lazbuild config so it can find the Lazarus source tree
            mkdir -p "$HOME/.lazarus"
            cat > "$HOME/.lazarus/environmentoptions.xml" <<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <CONFIG>
              <EnvironmentOptions>
                <LazarusDirectory Value="$LAZARUS_DIR"/>
                <CompilerFilename Value="$(which fpc)"/>
              </EnvironmentOptions>
            </CONFIG>
            EOF

            export PATH="$LAZARUS_DIR:$PATH"
            lazbuild --version
          run: |
            set -xeuo pipefail

            # Make lazbuild available in PATH
            export PATH="/tmp/lazarus-src:$PATH"

            # Install .NET SDK if available for this architecture
            if [ -n "$DOTNET_SDK_URL" ]; then
              export DOTNET_ROOT="$HOME/.dotnet"
              mkdir -p "$DOTNET_ROOT"
              wget -q "$DOTNET_SDK_URL" -O /tmp/dotnet-sdk.tar.gz
              tar xf /tmp/dotnet-sdk.tar.gz -C "$DOTNET_ROOT"
              rm /tmp/dotnet-sdk.tar.gz
              export PATH="$DOTNET_ROOT:$PATH"
              dotnet --version
            else
              echo "NOTE: .NET SDK not available for this architecture, skipping."
            fi

            openssl version
            fpc -iV
            lazbuild --version
            instantfpc .github/workflows/make.pas

  # ─── ARMv7 / Raspberry Pi (via QEMU user-mode on ubuntu-latest) ──────
  build-armv7:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    name: Linux ARMv7 (QEMU)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build on ARMv7
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: armv7
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y lazarus openssl wget ca-certificates

            # FPC 3.2.2 hardcodes libssl.1.1 / libcrypto.1.1 in its
            # openssl unit, but Ubuntu 24.04 ships OpenSSL 3.x only.
            # Symlink so FPC can find the libraries.
            ln -sf /usr/lib/arm-linux-gnueabihf/libssl.so.3 \
                   /usr/lib/arm-linux-gnueabihf/libssl.so.1.1
            ln -sf /usr/lib/arm-linux-gnueabihf/libcrypto.so.3 \
                   /usr/lib/arm-linux-gnueabihf/libcrypto.so.1.1

            # Install .NET SDK for ARM32 via official install script
            wget -q https://dot.net/v1/dotnet-install.sh -O /tmp/dotnet-install.sh
            chmod +x /tmp/dotnet-install.sh
            /tmp/dotnet-install.sh --channel 10.0 --quality ga \
              --install-dir /usr/share/dotnet
            ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
          run: |
            set -xeuo pipefail
            export DOTNET_ROOT=/usr/share/dotnet
            export PATH="$PATH:$DOTNET_ROOT"
            openssl version
            fpc -iV
            dotnet --version
            instantfpc .github/workflows/make.pas