name: Make

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      # ─── Linux (unified for x86_64 and AArch64) ────────────────────────
      - name: Build on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -xeuo pipefail
          sudo bash -c 'apt-get update; apt-get install -y lazarus' >/dev/null
          openssl version
          fpc -iV
          instantfpc .github/workflows/make.pas

      # ─── macOS (unified for x86_64 and AArch64) ───────────────────────
      - name: Build on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -xeuo pipefail

          LAZARUS_DIR="/tmp/lazarus-src"

          brew install fpc openssl@3

          # macOS runners ship LibreSSL which is incompatible with FPC's
          # openssl unit. Install real OpenSSL 3 and symlink the unversioned
          # dylib names that FPC 3.2.2 looks for at unit initialization.
          # Symlinks go into /usr/local/lib (default search path, SIP-safe)
          # rather than using DYLD_LIBRARY_PATH which SIP strips from child
          # processes spawned by instantfpc.
          OSSL_LIB="$(brew --prefix openssl@3)/lib"
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$OSSL_LIB/libssl.3.dylib"    /usr/local/lib/libssl.dylib
          sudo ln -sf "$OSSL_LIB/libcrypto.3.dylib"  /usr/local/lib/libcrypto.dylib
          sudo ln -sf "$OSSL_LIB/libssl.3.dylib"    /usr/local/lib/libssl.3.dylib
          sudo ln -sf "$OSSL_LIB/libcrypto.3.dylib"  /usr/local/lib/libcrypto.3.dylib

          git clone --depth 1 --branch lazarus_4_4 \
            https://github.com/fpc/Lazarus.git "$LAZARUS_DIR"
          make -C "$LAZARUS_DIR" lazbuild

          # Seed lazbuild config so it can find the Lazarus source tree
          mkdir -p "$HOME/.lazarus"
          cat > "$HOME/.lazarus/environmentoptions.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <CONFIG>
            <EnvironmentOptions>
              <LazarusDirectory Value="$LAZARUS_DIR"/>
              <CompilerFilename Value="$(which fpc)"/>
            </EnvironmentOptions>
          </CONFIG>
          EOF

          export PATH="$LAZARUS_DIR:$PATH"
          "$(brew --prefix openssl@3)/bin/openssl" version
          fpc -iV
          lazbuild --version
          instantfpc .github/workflows/make.pas

      # ─── Windows ────────────────────────────────────────────────────────
      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSDebug -Strict

          Write-Host "Installing Lazarus via Chocolatey..."
          choco install lazarus -y --no-progress

          # Discover FPC bin path dynamically
          $fpcDir = Get-ChildItem 'C:\Lazarus\fpc' -Directory | Select-Object -First 1
          $env:Path += ";C:\Lazarus;$($fpcDir.FullName)\bin\x86_64-win64"

          Write-Host "OpenSSL version:"
          openssl version

          Write-Host "FPC version:"
          fpc -iV

          Write-Host "Building make.pas..."
          instantfpc .github/workflows/make.pas