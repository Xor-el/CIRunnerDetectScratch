name: Make

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      # ─── Linux (unified for x86_64 and AArch64) ────────────────────────
      - name: Build on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -xeuo pipefail
          sudo bash -c 'apt-get update; apt-get install -y lazarus' >/dev/null
          fpc -iV
          instantfpc .github/workflows/make.pas

      # ─── macOS (unified for x86_64 and AArch64) ───────────────────────
      - name: Build on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -xeuo pipefail

          LAZARUS_DIR="/tmp/lazarus-src"

          brew install fpc
          git clone --depth 1 --branch lazarus_4_4 \
            https://github.com/fpc/Lazarus.git "$LAZARUS_DIR"
          make -C "$LAZARUS_DIR" lazbuild

          # Seed lazbuild config so it can find the Lazarus source tree
          mkdir -p "$HOME/.lazarus"
          cat > "$HOME/.lazarus/environmentoptions.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <CONFIG>
            <EnvironmentOptions>
              <LazarusDirectory Value="$LAZARUS_DIR"/>
              <CompilerFilename Value="$(which fpc)"/>
            </EnvironmentOptions>
          </CONFIG>
          EOF

          export PATH="$LAZARUS_DIR:$PATH"
          fpc -iV
          lazbuild --version
          instantfpc .github/workflows/make.pas

      # ─── Windows ────────────────────────────────────────────────────────
      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSDebug -Strict

          Write-Host "Installing Lazarus and OpenSSL 1.1 via Chocolatey..."
          choco install lazarus -y --no-progress
          choco install openssl.light --version=1.1.1.20181020 -y --no-progress

          # Discover FPC bin path dynamically
          $fpcDir = Get-ChildItem 'C:\Lazarus\fpc' -Directory | Select-Object -First 1
          $env:Path += ";C:\Lazarus;$($fpcDir.FullName)\bin\x86_64-win64"

          # Add OpenSSL to PATH (check known locations)
          $opensslPaths = @(
            'C:\ProgramData\chocolatey\lib\openssl.light\tools',
            'C:\Program Files\OpenSSL\bin',
            'C:\Program Files\OpenSSL-Win64\bin'
          )
          foreach ($p in $opensslPaths) {
            if (Test-Path $p) { $env:Path += ";$p" }
          }

          Write-Host "FPC version:"
          fpc -iV

          Write-Host "Building make.pas..."
          instantfpc .github/workflows/make.pas